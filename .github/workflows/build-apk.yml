name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'payroz-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: ./payroz-app
        run: flutter pub get

      - name: Build Release APK
        working-directory: ./payroz-app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: payroz-app-release
          path: payroz-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
